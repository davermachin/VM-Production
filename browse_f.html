          function onPressStart() {

          function startSpin() {
            const friction = 0.97; // lower = more friction

            function animate() {
              angle += velocity;
              velocity *= friction;

              img.style.transform = `rotate(${angle}deg)`;

              if (velocity > 0.1) {
                animationFrame = requestAnimationFrame(animate);
              } else {
                velocity = 0;
                cancelAnimationFrame(animationFrame);
                animationFrame = null;

                onSpinComplete();
              }

            animate();

function getEra(year) {
  if (year < 1800) {
    return "Pre-1800";
  } else if (year < 1900) {
    return "1800s";
  } else if (year < 1910) {
    return "1900s";
  } else if (year < 1920) {
    return "1910s";
  } else if (year < 1930) {
    return "1920s";
  } else if (year < 1940) {
    return "1930s";
  } else if (year < 1950) {
    return "1940s";
  } else if (year < 1960) {
    return "1950s";
  } else if (year < 1970) {
    return "1960s";
  } else if (year < 1980) {
    return "1970s";
  } else if (year < 1990) {
    return "1980s";
  } else if (year < 2000) {
    return "1990s";
  } else {
    return "2000+";
  }
}




function getSelectedButtonData(div) {
  // Allow either a div element or an ID string

  // Select all buttons whose id starts with "btn_"
  const buttons = div.querySelectorAll('button[id^="btn_"]');

  // Filter selected buttons and map to {name, value}

    .map(btn => ({
      name: btn.dataset.field1,
      value: btn.dataset.field2
    }));

  return result;
}



          function stringToColor(str, intensity) {
            if (!str || typeof str !== "string") return "#cccccc";

            // 1. Normalize first letter
            const firstChar = str.trim().charAt(0).toLowerCase();
            const charCode = firstChar.charCodeAt(0);

            // a–z → 0–25 (fallback if not a letter)
            let index = charCode >= 97 && charCode <= 122
              ? charCode - 97
              : charCode % 26;

            // 2. Map to hue (0–360)
            const hue = Math.floor((index / 26) * 360);

            // 3. Clamp intensity (0–255) → saturation (0–100%)
            const clamped = Math.max(0, Math.min(100, intensity));
            const saturation = Math.round((clamped / 125) * 100);

            // 4. Fixed lightness (adjust if you want lighter/darker buttons)
            const lightness = 75;

            // 5. Return CSS color
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
          }

// fixes here
          function sortData(data) {
            return data.slice().sort((a, b) => {
              // 1. Sort by genre
              if (a.genre !== b.genre) {
                return a.genre.localeCompare(b.genre);
              }

              // 2. Then by media_type
              if (a.media_type !== b.media_type) {
                return a.media_type.localeCompare(b.media_type);
              }

              // 3. now by year
              if (a.year !== b.year){
                return a.year - b.year;
              }

              // 3. finally by title
              return a.title.localeCompare(b.title);
              
            });
          }

              grouped[genre][media_type][era][year].add(title);
            });

// fixes here - changed filter_countries to filter


function filterGroupedData(grouped, filters) {
  if (!grouped || typeof grouped !== 'object') return {};

  let result = {};

  for (const [key, sub] of Object.entries(grouped)) {
    // Check if key matches any filter value
    const matches = filters.some(f => f.value === key);

    if (matches) {
      result[key] = sub;
    } else if (sub && typeof sub === 'object') {
      // Recursively filter nested objects
      const filteredSub = filterGroupedData(sub, filters);
      if (Object.keys(filteredSub).length > 0) {
        result[key] = filteredSub;
      }
    }
  }

  return result;
}
