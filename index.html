var global_data=null; // hoping this is global and stores each airtable lookup
let touchStartX = 0;


function remove_slideshow(){
  document.getElementById("slide_show_container").style.display="none";
}


  function showImage(index) {
    currentIndex = (index + imageArray.length) % imageArray.length;
    
    document.getElementById("slide_show_image").style.opacity = 0;
    setTimeout(() => {
      document.getElementById("slide_show_image").src = imageArray[currentIndex].url;
      document.getElementById("slide_show_image").style.opacity = 1;
    }, 500);
  }

  function slide_show_next() {
    showImage(currentIndex + 1);
  }

  function slide_show_prev() {
    showImage(currentIndex - 1);
  }


function createSlideshow(dataIndex, startIndex = 0) {

  let currentIndex = startIndex;

  // Touch swipe support
   touchStartX = 0;
  
  // Initialize

  if (dataIndex<0)
  {
    imageArray = global_data.records.flatMap(
      record => record.fields["Image Preview"] || []
    );
  } else {
    imageArray=global_data.records[dataIndex].fields["Image Preview"];
  }
  


  document.getElementById("slide_show_container").style.display="block";
  showImage(currentIndex);
}


    var page_list=[""];
    var current_page=0;
    var slideIndex = 1;

    


    function highlightOccurrences(target, text) {
        if (!target || !text) return text; // Return original text if inputs are empty

        // Escape special characters in target string to use in regex
        const escapedTarget = target.replace(/[-/\\^$*+?.()|[\]{}]/g, "\\$&");

        // Create a regex to find all occurrences of target
        const regex = new RegExp(escapedTarget, 'gi'); // Case insensitive global search

        // Replace occurrences with wrapped HTML tag
        return text.replace(regex, `<mark>$&</mark>`);
    }


    function isValidURL(url) {
        try {
            new URL(url);
            return true;
        } catch (error) {
            return false;
        }
    }

    function getYouTubeThumbnail(url) {
        var videoId = url.match(/[?&]v=([^&]+)/) || url.match(/youtu\.be\/([^?]+)/);
        if (videoId && videoId[1]) {
            return `https://img.youtube.com/vi/${videoId[1]}/maxresdefault.jpg`;
        }
        return null;
    }

    function toTitleCase(str) {
        return str.replace(/\w\S*/g, function(txt){
            return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
        });
    }


    function clear_picture(){
      document.getElementById("picture_frame").innerHTML=""
      document.getElementById("picture_frame").style.display = 'none';
	    document.getElementById("picture_frame_overlay").style.display = 'none';
    }

		  $.ajaxSetup({

		  });

		// same api request as below but no page limit - limiting slideshow to one page of results

  String.prototype.replaceAll = function(strReplace, strWith) {
      // See http://stackoverflow.com/a/3561711/556609
      var esc = strReplace.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
      var reg = new RegExp(esc, 'ig');
      return this.replace(reg, strWith);
  };

}

      $.ajaxSetup({

				       'Authorization': "Bearer patD5dYFBjdTtIAY8.20d135bce39d21c1b5ca51607082cd53bc1e64158373e0aa0065df8d54c79b0e" //read only token

         }
      });

      $.get("https://api.airtable.com/v0/app5Q6OlJ3iMkJ8cd/Reels?view=API&pageSize=20&sort%5B0%5D%5Bfield%5D=Name&offset="+offset+"&filterByFormula=OR(SEARCH(%22"+search_for_url+"%22%2C+LOWER(%7Bstate%7D))%2CSEARCH(%22"+search_for_url+"%22%2C+LOWER(%7Bimage+description%7D))%2CSEARCH(%22"+search_for_url+"%22%2C+LOWER(%7Bname%7D))%2CSEARCH(%22"+search_for_url+"%22%2C+LOWER(%7BReel+ID+Number%7D)))", function(data, status){

					//output_content += "<img style=\"cursor:pointer\" src=\"./slide.png\" width=32px onclick=\"slide_show(document.getElementById('seach_for_text').value.trim())\">"
          output_content += "<button type=\"button\" onclick=\"slide_show(document.getElementById('seach_for_text').value.trim())\">Slideshow</button>"

              if (navigator.share) {

                $.each(data.records, function(index){

                      output_content += "<div class=\"container\"><h2>"

                      if (data.records[index].fields["Show_Marker"]) {

                      output_content += "</h2>"
                      output_content += "</div>" //container


                      image_preview=data.records[index].fields["Image Preview"];


                      output_content += "<div class=\"image_group\">"
                      $.each(image_preview, function(index2){
                        //output_content += "<div class=\"box-shadow\" onclick=\"show_image('"+image_preview[index2].url+"')\">"
                        output_content += "<div class=\"box-shadow\" onclick=\"createSlideshow("+index+","+index2+")\">"
                        output_content += "<img  src= \" "+image_preview[index2].url+" \"  >"
                        output_content += "</div>"

                      output_content += "</div>" //image group


                      if (data.records[index].fields["Image Description"]) {

                      if (data.records[index].fields["Contributor"]) {

                        }

                        output_content += data.records[index].fields["Contributor"]

                        if (isValidURL(data.records[index].fields["External_URL"])) {

                        output_content += "</a>";+"</p>"

                      output_content += "</div>" //card
                })

                if (current_page>0){

                }
                //console.log(data.offset);
        } else {
            output_content ="<p>None Found - Need To Buy More View-Masters!</p>"
        }

        document.getElementById("search_results").innerHTML = output_content;
      });


    }

</script>

  <script language="javascript">


  // Click navigation (left/right zones)
  document.getElementById("slide_show_container").addEventListener("click", (e) => {
    const x = e.clientX;
    const width = window.innerWidth;

    if (x < width * 0.3) {
      slide_show_prev();
    } else if (x > width * 0.7) {
      slide_show_next();
    }
  });

// Keyboard navigation (optional bonus)
  window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") slide_show_next();
    if (e.key === "ArrowLeft") slide_show_prev();
    if (e.key === "Escape") remove_slideshow();
  });


  document.getElementById("slide_show_close_button").addEventListener("click", () => {
  remove_slideshow(); // removes the slideshow div from DOM
});



  document.getElementById("slide_show_container").addEventListener("touchstart", (e) => {
    //e.preventDefault();
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  document.getElementById("slide_show_container").addEventListener("touchmove", (e) => {
    e.preventDefault();  // prevents scroll while swiping inside the div
  }, { passive: false });

  document.getElementById("slide_show_container").addEventListener("touchend", (e) => {
    //e.preventDefault();
    const touchEndX = e.changedTouches[0].clientX;
    const deltaX = touchEndX - touchStartX;

    if (Math.abs(deltaX) > 50) {
      if (deltaX > 0) {
        slide_show_prev(); // swipe right
      } else {
        slide_show_next(); // swipe left
      }
    }
  }, { passive: true });




    function newsearch(){
        page_list=[""];
        current_page=0;

    		$("#seach_for_text").blur();
            document.getElementById("search_button").style.display="none";
            SearchReel(document.getElementById('seach_for_text').value.trim(), '')
        }



        // Get the input field
        var input = document.getElementById("seach_for_text");

        // Execute a function when the user releases a key on the keyboard
        input.addEventListener("keyup", function(event) {
          // Number 13 is the "Enter" key on the keyboard
          if (event.keyCode === 13 && document.getElementById("seach_for_text").value.length > 0) {
            event.preventDefault();
            newsearch();
          }
        });
