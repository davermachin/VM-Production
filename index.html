<script language="javascript">

var global_data=null; // hoping this is global and stores each airtable lookup

function createSlideshow(dataIndex, startIndex = 0) {

console.log("Global Data is ",global_data);
console.log("DataIndex is ",dataIndex);
console.log("Start index is ", startIndex);






  let currentIndex = startIndex;


  // Create container
  const container = document.createElement("div");
  container.style.position = "fixed";
  container.style.top = 0;
  container.style.left = 0;
  container.style.width = "100vw";
  container.style.height = "100vh";
  container.style.background = "black";
  container.style.display = "flex";
  container.style.alignItems = "center";
  container.style.justifyContent = "center";
  container.style.zIndex = 9999;
  container.style.overflow = "hidden";

  // Image element
  const img = document.createElement("img");
  img.style.maxWidth = "100%";
  img.style.maxHeight = "100%";
  img.style.objectFit = "contain";
  img.style.transition = "opacity 0.3s ease";


  // close button
const closeBtn = document.createElement("button");

closeBtn.textContent = "X"; // fancy X
closeBtn.style.position = "absolute";
closeBtn.style.top = "2px";
closeBtn.style.right = "2px";
closeBtn.style.fontSize = "24px";
closeBtn.style.color = "white";
closeBtn.style.background = "rgba(0,0,0,0.5)";
closeBtn.style.border = "none";
closeBtn.style.borderRadius = "4px";
closeBtn.style.cursor = "pointer";
closeBtn.style.zIndex = 10000; // make sure it's above the image

closeBtn.style.display = "inline-block"; // shrink to fit content
closeBtn.style.width = "auto";           // override min-width
closeBtn.style.minWidth = "0";           // override default min-width
closeBtn.style.padding = "0 4px";        // optional small padding

closeBtn.addEventListener("click", () => {
  container.remove(); // removes the slideshow div from DOM
});


  container.appendChild(img);
  container.appendChild(closeBtn);
  document.body.appendChild(container);

  function showImage(index) {
    currentIndex = (index + imageArray.length) % imageArray.length;
    img.style.opacity = 0;
    setTimeout(() => {
      img.src = imageArray[currentIndex].url;
      img.style.opacity = 1;
    }, 150);
  }

  function next() {
    showImage(currentIndex + 1);
  }

  function prev() {
    showImage(currentIndex - 1);
  }

  // Click navigation (left/right zones)
  container.addEventListener("click", (e) => {
    const x = e.clientX;
    const width = window.innerWidth;

    if (x < width * 0.3) {
      prev();
    } else if (x > width * 0.7) {
      next();
    }
  });

  // Touch swipe support
  let touchStartX = 0;

  container.addEventListener("touchstart", (e) => {
    touchStartX = e.touches[0].clientX;
  });

  container.addEventListener("touchend", (e) => {
    const touchEndX = e.changedTouches[0].clientX;
    const deltaX = touchEndX - touchStartX;

    if (Math.abs(deltaX) > 50) {
      if (deltaX > 0) {
        prev(); // swipe right
      } else {
        next(); // swipe left
      }
    }
  });

  // Keyboard navigation (optional bonus)
  window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
    if (e.key === "Escape") container.remove();
  });

  // Initialize

  if (dataIndex<0)
  {
    imageArray = global_data.records.flatMap(
      record => record.fields["Image Preview"] || []
    );
  } else {
    imageArray=global_data.records[dataIndex].fields["Image Preview"];
  }
    console.log("Image array is ",imageArray);  

  showImage(currentIndex);
}










































    var page_list=[""];

    function highlightOccurrences(target, text) {
        if (!target || !text) return text; // Return original text if inputs are empty

        // Escape special characters in target string to use in regex
        const escapedTarget = target.replace(/[-/\\^$*+?.()|[\]{}]/g, "\\$&");

        // Create a regex to find all occurrences of target
        const regex = new RegExp(escapedTarget, 'gi'); // Case insensitive global search

        // Replace occurrences with wrapped HTML tag
        return text.replace(regex, `<mark>$&</mark>`);
    }


    function isValidURL(url) {
        try {
            new URL(url);
            return true;
        } catch (error) {
            return false;
        }
    }

    function getYouTubeThumbnail(url) {
        var videoId = url.match(/[?&]v=([^&]+)/) || url.match(/youtu\.be\/([^?]+)/);
        if (videoId && videoId[1]) {
            return `https://img.youtube.com/vi/${videoId[1]}/maxresdefault.jpg`;
        }
        return null;
    }

    function toTitleCase(str) {
        return str.replace(/\w\S*/g, function(txt){
            return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
        });
    }

  String.prototype.replaceAll = function(strReplace, strWith) {
      // See http://stackoverflow.com/a/3561711/556609
      var esc = strReplace.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
      var reg = new RegExp(esc, 'ig');
      return this.replace(reg, strWith);
  };
