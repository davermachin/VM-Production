<script>
  $('document').ready(function(){
      
      document.addEventListener("click", (e) => {        

      if (e.target.tagName === "A") return; // don't toggle if clicking a link
      if (e.target.classList.contains("vmt-top-right-btn")) return;

      const videoRow = e.target.closest(".vmt-video-row");
      if (!videoRow) return;  // click was outside a video row

      const desc = videoRow.querySelector(".vmt-video-description");
      const btn = videoRow.querySelector(".vmt-toggle-btn");      

      if (!desc) return;      

      // Toggle expand/collapse
      if (desc.style.maxHeight && desc.style.maxHeight !== "") {
        // Collapse
        desc.style.maxHeight = "";
        desc.style.overflow = "hidden";
        desc.style.display = "-webkit-box";
        if (btn) btn.textContent = "More";
      } else {
        // Expand
        desc.style.maxHeight = desc.scrollHeight + "px";
        desc.style.overflow = "visible";
        desc.style.display = "block";
        desc.style.maxHeight = desc.scrollHeight + "px";  // animate to full height        
        if (btn) btn.textContent = "Less";
      }
      
      });



      displayPagePicker("page_picker_nav");
      read_database();

    });


var global_data=null; // hoping this is global and stores each airtable lookup

    function isValidURL(url) {
        try {
            new URL(url);
            return true;
        } catch (error) {
            return false;
        }
    }

    function getYouTubeThumbnail(url) {
        var videoId = url.match(/[?&]v=([^&]+)/) || url.match(/youtu\.be\/([^?]+)/);
        if (videoId && videoId[1]) {
            return `https://img.youtube.com/vi/${videoId[1]}/maxresdefault.jpg`;
        }
        return null;
    }

    function toTitleCase(str) {
        return str.replace(/\w\S*/g, function(txt){
            return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
        });
    }


async function lookupYoutube(videoId) {
  const API_KEY = "AIzaSyCNh3zuiidSD63Bw3JF1q-IsVidB_mZNw4";

  const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoId}&key=${API_KEY}`;

  try {
    const response = await fetch(url);
    const data = await response.json();

    if (!data.items || data.items.length === 0) {
      throw new Error("Video not found");
    }

    const snippet = data.items[0].snippet;

    return {
      videoId: videoId,
      title: snippet.title,
      description: snippet.description,
      thumbnails: {
        default: snippet.thumbnails.default?.url || null,
        medium: snippet.thumbnails.medium?.url || null,
        high: snippet.thumbnails.high?.url || null,
        standard: snippet.thumbnails.standard?.url || null,
        maxres: snippet.thumbnails.maxres?.url || null
      }
    };

  } catch (error) {
    console.error("lookupYoutube error:", error);
    return null;
  }
}

    function sortData(data) {

            return data.slice().sort((a, b) => {
              const main_groupA = a.main_group || "";
              const main_groupB = b.main_group || "";
              if (main_groupA !== main_groupB) {
                return main_groupA.localeCompare(main_groupB);
              }

              const Sort_ByA = a.Sort_By || "";
              const Sort_ByB = b.Sort_By || "";
              if (Sort_ByA !== Sort_ByB) {
                return Sort_ByA.localeCompare(Sort_ByB);
              }

            });


          }

function linkify(text) {
  const urlPattern = /(\bhttps?:\/\/[^\s]+)/gi;
  return text.replace(urlPattern, url => `<a href="${url}" target="_blank">${url}</a>`);
}

function formatText(text){

  if (text === undefined || text === null){
    text="";
  }

  text=marked.parse(text);

  return text;
}

async function render_list(){

      // for test
      lookupYoutube("VGaIWJk6KiQ").then(console.log);

      //loop through all videos loaded from airtable

      container=document.getElementById("search_results");
      container.innerHTML="";

      // Step 1: create placeholders in correct order
        const divs = all_records.map(() => {
          const div = document.createElement("div");
          div.textContent = "...";
          container.appendChild(div);
          return div;
        });

      // Step 2: fetch all in parallel
        const results = await Promise.all(
          all_records.map(async (item) => {
            const ytData = await lookupYoutube(item.YT_ID); // get YouTube info
            return {
              ...item,     // original fields from all_records
              ...ytData    // fields returned from lookupYoutube (title, description, thumbnails, etc.)
            };
          })
        );

console.log("consolidated ", results);

        // Step 3: fill them in (still ordered)
        results.forEach((data, index) => {
          if (!data) return;

          divs[index].innerHTML = `





            <div class="vmt-video-row">
              <img class="vmt-thumbnail" src="${data.thumbnails.default}" alt="Thumbnail">
              
              <div class="vmt-video-content">
                <button class="vmt-top-right-btn" onclick="window.open('https://youtu.be/${data.YT_ID}')"></button>
                <h3 class="vmt-video-title">${data.title}</h3>
              
              </div>
              
              <div class="vmt-video-description"><p>${formatText(data.Notes)}</p><p>${formatText(data.description)}</p></div>
                
              </div>

              
            </div>

          `;
        });
      }
